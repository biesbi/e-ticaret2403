<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odeme Sonucu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Outfit, Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #0f172a;
      padding: 16px;
    }
    .box {
      padding: clamp(20px, 5vw, 36px) clamp(16px, 5vw, 32px);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.10);
      text-align: center;
      width: min(92vw, 440px);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .sub { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
    .countdown {
      display: inline-block;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: #475569;
      margin-bottom: 18px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }
    .btn {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
    }
    .btn-primary {
      background: #ffcc00;
      color: #111827;
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .btn[disabled] {
      opacity: 0.7;
      cursor: wait;
    }
    .success h1 { color: #15803d; }
    .retry h1 { color: #b45309; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="icon" id="icon">...</div>
    <h1 id="title">Sonuc Bekleniyor</h1>
    <p class="sub" id="message">Lutfen bekleyin...</p>
    <div class="countdown" id="countdown"></div>
    <div class="actions" id="actions"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var status = params.get('status');
      var orderId = params.get('order_id') || '';
      var isSuccess = (status === 'success');

      var box = document.getElementById('box');
      var icon = document.getElementById('icon');
      var title = document.getElementById('title');
      var message = document.getElementById('message');
      var countdown = document.getElementById('countdown');
      var actions = document.getElementById('actions');

      function authHeaders() {
        var headers = { 'Content-Type': 'application/json' };
        try {
          var token = localStorage.getItem('token');
          if (token) headers.Authorization = 'Bearer ' + token;
        } catch (e) {}
        return headers;
      }

      function setButtonLoading(button, loading, idleText) {
        if (!button) return;
        button.disabled = !!loading;
        button.textContent = loading ? 'Yukleniyor...' : idleText;
      }

      function addActionButton(label, className, onClick, href) {
        var element = href ? document.createElement('a') : document.createElement('button');
        element.className = 'btn ' + className;
        element.textContent = label;

        if (href) {
          element.href = href;
        } else {
          element.type = 'button';
          element.addEventListener('click', onClick);
        }

        actions.appendChild(element);
        return element;
      }

      function publishSuccess(orderIdValue) {
        if (!orderIdValue) return;

        try {
          var channel = new BroadcastChannel('paytr_payment_' + orderIdValue);
          channel.postMessage({ status: 'success', orderId: orderIdValue });
          setTimeout(function () { channel.close(); }, 2000);
        } catch (e) {}

        try {
          localStorage.setItem('paytr_result', JSON.stringify({
            orderId: orderIdValue,
            status: 'success',
            ts: Date.now()
          }));
        } catch (e) {}
      }

      function startRetryPayment(button) {
        if (!orderId) return;

        setButtonLoading(button, true, 'Odemeyi Yeniden Baslat');
        message.textContent = 'Yeni PAYTR oturumu olusturuluyor...';

        fetch('/api/orders/retry-payment', {
          method: 'POST',
          credentials: 'include',
          headers: authHeaders(),
          body: JSON.stringify({ order_id: orderId })
        })
          .then(function (response) { return response.json(); })
          .then(function (data) {
            if (!data || data.success === false) {
              throw new Error((data && data.message) || 'Odeme yeniden baslatilamadi.');
            }

            if (data.payment && data.payment.payment_url) {
              window.location.href = data.payment.payment_url;
              return;
            }

            throw new Error((data && data.message) || 'Yeni odeme linki olusturulamadi.');
          })
          .catch(function (error) {
            message.textContent = error && error.message
              ? error.message
              : 'Odeme yeniden baslatilamadi. Lutfen tekrar deneyin.';
            setButtonLoading(button, false, 'Odemeyi Yeniden Baslat');
          });
      }

      if (orderId) {
        try {
          localStorage.setItem('lastOrderId', orderId);
          localStorage.removeItem('paytr_result');
        } catch (e) {}
      }

      if (isSuccess) {
        box.classList.add('success');
        icon.textContent = 'OK';
        title.textContent = 'Odeme Basarili';
        message.textContent = 'Odemeniz alindi. Siparis sayfaniza yonlendiriliyorsunuz...';
        publishSuccess(orderId);

        var successDelay = 3;
        var successRemaining = successDelay;
        (function tick() {
          countdown.textContent = successRemaining + ' saniye icinde yonlendiriliyorsunuz...';
          if (successRemaining <= 0) {
            countdown.textContent = 'Yonlendiriliyor...';
            window.location.href = '/order-success.html?order_id=' + encodeURIComponent(orderId);
            return;
          }
          successRemaining--;
          setTimeout(tick, 1000);
        })();
        return;
      }

      box.classList.add('retry');
      icon.textContent = '...';
      title.textContent = 'Odeme Tamamlanmadi';
      message.textContent = 'Odeme bilgisi yalnizca basarili callback geldiginde islenir. Bu siparis icin yeni bir PAYTR oturumu baslatabilirsiniz.';
      countdown.textContent = orderId
        ? 'Mevcut token suresi doldugunda temizlenir; isterseniz simdi yeni odeme oturumu baslatabilirsiniz.'
        : 'Siparis bilgisi bulunamadigi icin yeni oturum baslatilamiyor.';

      if (orderId) {
        var retryButton = addActionButton('Odemeyi Yeniden Baslat', 'btn-primary', function () {
          startRetryPayment(retryButton);
        });
      }

      addActionButton('Ana Sayfaya Don', 'btn-secondary', null, '/');
    })();
  </script>
</body>
</html>
