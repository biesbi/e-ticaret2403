<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme Sonucu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Outfit, Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #0f172a;
    }
    .box {
      padding: clamp(20px,5vw,36px) clamp(16px,5vw,32px);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.10);
      text-align: center;
      width: min(90vw, 400px);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .sub { color: #64748b; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    .countdown {
      display: inline-block;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: #475569;
    }
    .success h1 { color: #15803d; }
    .failed  h1 { color: #dc2626; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Sonuç Bekleniyor</h1>
    <p class="sub" id="message">Lütfen bekleyin...</p>
    <span class="countdown" id="countdown"></span>
  </div>

  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var status  = params.get('status');
      var orderId = params.get('order_id') || '';
      var isSuccess = (status === 'success');

      var box       = document.getElementById('box');
      var icon      = document.getElementById('icon');
      var title     = document.getElementById('title');
      var message   = document.getElementById('message');
      var countdown = document.getElementById('countdown');

      box.classList.add(isSuccess ? 'success' : 'failed');
      icon.textContent  = isSuccess ? '✅' : '❌';
      title.textContent = isSuccess ? 'Ödeme Başarılı' : 'Ödeme Başarısız';
      message.textContent = isSuccess
        ? 'Ödemeniz alındı. Sipariş sayfanıza yönlendiriliyorsunuz...'
        : 'Ödeme işlemi tamamlanamadı. Ana sayfaya yönlendiriliyorsunuz...';

      function notifyFailedPaymentBackend() {
        if (isSuccess || !orderId) return;

        try {
          var headers = { 'Content-Type': 'application/json' };
          try {
            var token = localStorage.getItem('token');
            if (token) headers.Authorization = 'Bearer ' + token;
          } catch (e) {}

          fetch('/api/orders/cancel-payment', {
            method: 'POST',
            keepalive: true,
            credentials: 'include',
            headers: headers,
            body: JSON.stringify({ order_id: orderId })
          }).catch(function () {});
        } catch (e) {}
      }

      // Ana sekmeye BroadcastChannel + localStorage ile haber ver
      if (orderId) {
        try {
          var ch = new BroadcastChannel('paytr_payment_' + orderId);
          ch.postMessage({ status: isSuccess ? 'success' : 'failed', orderId: orderId });
          setTimeout(function () { ch.close(); }, 2000);
        } catch (e) {}

        try {
          localStorage.setItem('paytr_result', JSON.stringify({
            orderId: orderId,
            status: isSuccess ? 'success' : 'failed',
            ts: Date.now()
          }));
        } catch (e) {}
      }

      // Geri sayım ve yönlendirme
      notifyFailedPaymentBackend();

      var delay = isSuccess ? 3 : 4;
      var remaining = delay;

      function tick() {
        countdown.textContent = remaining + ' saniye içinde yönlendiriliyorsunuz...';
        if (remaining <= 0) {
          countdown.textContent = 'Yönlendiriliyor...';
          if (isSuccess && orderId) {
            window.location.href = '/order-success.html?order_id=' + encodeURIComponent(orderId);
          } else {
            window.location.href = '/';
          }
          return;
        }
        remaining--;
        setTimeout(tick, 1000);
      }
      tick();
    })();
  </script>
</body>
</html>
